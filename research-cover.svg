<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="400" fill="#141b24"/>
  <g fill="none" stroke="#26313d" stroke-width="1">
    <path d="M0 200 H640 M320 0 V400"/>
  </g>
  <!-- gait / motion-capture waveform across the frame -->
  <polyline points="40,240 90,240 130,150 165,300 205,200 250,280 300,130 355,270 410,210 470,250 520,175 600,240"
    fill="none" stroke="#f2a33c" stroke-width="2.5" opacity="0.9"/>
  <!-- mocap markers -->
  <g fill="#f2a33c">
    <circle cx="130" cy="150" r="4.5"/><circle cx="205" cy="200" r="4.5"/>
    <circle cx="300" cy="130" r="4.5"/><circle cx="410" cy="210" r="4.5"/>
    <circle cx="520" cy="175" r="4.5"/>
  </g>
  <!-- stick-figure stride abstraction -->
  <g stroke="#4fb286" stroke-width="2" fill="none" opacity="0.8">
    <circle cx="300" cy="120" r="0"/>
  </g>
  <!-- baseline vs stimulation dashed comparison -->
  <polyline points="40,270 90,270 130,220 165,310 205,250 250,300 300,205 355,295 410,255 470,285 520,235 600,270"
