  <text x="40" y="52" font-family="'IBM Plex Mono',monospace" font-size="13" letter-spacing="3" fill="#647587">GAIT · PROPRIOCEPTION · MOTION</text>
  <text x="40" y="366" font-family="'IBM Plex Mono',monospace" font-size="12" letter-spacing="2" fill="#f2a33c" opacity="0.8">VICON · MATLAB · BIOMECHANICS</text>
</svg>
